name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest

  frontend:
    name: Frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm run test

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t lmvs-backend ./backend
      - name: Build frontend image
        run: docker build -t lmvs-frontend ./frontend

  security:
    name: Dependency & secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can diff the PR commit range
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python dependency audit
        run: pip install pip-audit && pip-audit -r backend/requirements.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node dependency audit
        run: cd frontend && npm audit --audit-level=high || true
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
